spring.application.name=laughtaleProject

# 서버 포트 설정
server.port=8088

# mysql 연결 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jsldb?serverTimezone=Asia/Seoul
spring.datasource.username=****
spring.datasource.password=****
# mybatis 설정
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.laughtale.domain

# 파일 업로드 및 이미지 출력 경로
# 실제 저장 위치
# 웹에서 이미지 접근 경로
uploadPath=/laughtale/item
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# thymeleaf 설정
spring.thymeleaf.cache=false

# 인코딩 설정
server.servlet.encoding.charset=utf-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.messages.basename=message
spring.messages.encoding=utf-8

# JPA
# 테이블을 자동으로 생성/수정하겠다는 설정
spring.jpa.hibernate.ddl-auto=update
# 실제로 어떤 SQL이 실행되는지 콘솔창에 보여달라는 설정
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Groq AI
groq.api.key=****
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile