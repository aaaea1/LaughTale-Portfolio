<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/main}">
<head>
<title>AIおすすめ - LaughTale</title>
</head>
<th:block layout:fragment="content">
	<div class="row mb-4">
		<div class="col">
			<h1>
				<i class="bi bi-stars"></i> AIおすすめ書籍
			</h1>
			<p class="text-muted">Groq AIが貸出履歴をもとにおすすめを提案します。</p>
		</div>
		<div class="col-auto">
			<button class="btn btn-primary" onclick="refreshRec()">
				<i class="bi bi-arrow-clockwise"></i> 更新
			</button>
		</div>
	</div>
	<div class="card">
		<div class="card-body">
			<div id="recommendations" style="white-space: pre-wrap;"></div>
		</div>
	</div>
</th:block>
<th:block layout:fragment="scripts">
	<script>
$(function() { loadRec(); });
function loadRec() { showLoading(); $.get('/api/recommendations/refresh').done(d => { $('#recommendations').text(d.recommendations); hideLoading(); }).fail(() => { hideLoading(); showToast('おすすめの取得に失敗しました。', 'error'); }); }
function refreshRec() { if(confirm('新しいおすすめを表示しますか？')) loadRec(); }
</script>
</th:block>
</html>
