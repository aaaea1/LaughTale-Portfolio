<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/main}">
<head>
<title>マイレビュー - LaughTale</title>
</head>
<th:block layout:fragment="content">
	<h1 class="mb-4">
		<i class="bi bi-chat-left-text"></i> マイレビュー
	</h1>
	<div class="card">
		<div class="card-body" id="reviews"></div>
	</div>
</th:block>
<th:block layout:fragment="scripts">
	<script>
$(function() {
    $.get('/user/reviews/list').done(d => $('#reviews').html(d.map(r => `
        <div class="card mb-3"><div class="card-body"><h6>${r.bookTitle}</h6>
        <div class="text-warning">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        <p>${r.content}</p>
        <button class="btn btn-sm btn-danger" onclick="delReview(${r.reviewId})">削除</button></div></div>
    `).join('') || '<p class="text-muted">投稿したレビューはありません。</p>'));
});
function delReview(id) { if(confirm('削除しますか？')) $.ajax({url:'/api/reviews/'+id,method:'DELETE'}).done(() => location.reload()); }
</script>
</th:block>
</html>
